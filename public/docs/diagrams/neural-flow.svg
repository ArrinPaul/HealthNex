<svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" rx="40" fill="#020617"/>
  
  <!-- Flow -->
  <path d="M100 150H700" stroke="#1e293b" stroke-width="4" stroke-dasharray="8 8"/>
  
  <!-- Step 1 -->
  <rect x="50" y="110" width="160" height="80" rx="16" fill="#f8fafc" fill-opacity="0.05" stroke="#f8fafc" stroke-width="2"/>
  <text x="130" y="145" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Input Layer</text>
  <text x="130" y="165" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Voice / Text Feed</text>
  
  <!-- Step 2 -->
  <rect x="290" y="110" width="220" height="80" rx="16" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="145" fill="#8b5cf6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Gemini v1.5 Pro</text>
  <text x="400" y="165" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Neural Processing Hub</text>
  
  <!-- Step 3 -->
  <rect x="590" y="110" width="160" height="80" rx="16" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="670" y="145" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Intelligence</text>
  <text x="670" y="165" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Predictive Vectors</text>
</svg>
