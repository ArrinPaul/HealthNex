<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" rx="40" fill="#020617"/>
  <rect x="0.5" y="0.5" width="799" height="499" rx="39.5" stroke="#1e293b"/>
  
  <!-- Grid -->
  <path d="M0 100H800M0 200H800M0 300H800M0 400H800M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500" stroke="#ffffff" stroke-opacity="0.03"/>

  <!-- Nodes -->
  <!-- Community Nodes -->
  <rect x="50" y="80" width="180" height="80" rx="16" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-width="2"/>
  <text x="140" y="120" fill="#0ea5e9" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Community Nodes</text>
  <text x="140" y="140" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Ground Intelligence</text>

  <!-- Institutional Hub -->
  <rect x="570" y="80" width="180" height="80" rx="16" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="660" y="120" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Institutional Hub</text>
  <text x="660" y="140" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Verification &amp; Control</text>

  <!-- Convex Backend -->
  <rect x="310" y="80" width="180" height="80" rx="16" fill="#f8fafc" fill-opacity="0.05" stroke="#f8fafc" stroke-width="2"/>
  <text x="400" y="120" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Convex Backend</text>
  <text x="400" y="140" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Real-time Sync Engine</text>

  <!-- Gemini AI -->
  <rect x="310" y="240" width="180" height="100" rx="16" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 4"/>
  <circle cx="400" cy="275" r="15" fill="#8b5cf6" fill-opacity="0.2"/>
  <text x="400" y="305" fill="#8b5cf6" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Gemini v1.5 Pro</text>
  <text x="400" y="325" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Neural Analysis Hub</text>

  <!-- Alert Bus -->
  <rect x="310" y="410" width="180" height="60" rx="16" fill="#f43f5e" fill-opacity="0.1" stroke="#f43f5e" stroke-width="2"/>
  <text x="400" y="440" fill="#f43f5e" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Global Alert Bus</text>
  <text x="400" y="455" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">Active Protocol Broadcast</text>

  <!-- Arrows -->
  <path d="M230 120H310" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M570 120H490" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M400 160V240" stroke="#f8fafc" stroke-width="2" marker-end="url(#arrow-white)"/>
  <path d="M400 340V410" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-violet)"/>

  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L0 6L9 3z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L0 6L9 3z" fill="#10b981"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L0 6L9 3z" fill="#f8fafc"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L0 6L9 3z" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>
